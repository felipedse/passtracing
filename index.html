    <body style="background-color:black;">
        <!-- Import maps polyfill -->
        <!-- Remove this when import maps will be widely supported -->
        <script async src="https://unpkg.com/es-module-shims@1.3.6/dist/es-module-shims.js"></script>

        <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.147.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.147.0/examples/jsm/",
                "three-mesh-ui": "https://unpkg.com/three-mesh-ui@6.5.2/build/three-mesh-ui.module.js"
            }
        }

        <script type="x-shader/x-vertex" id="vertexshader">
        varying vec2 vUv;

        void main() {
            vUv = uv;
            gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
        }
        </script>

        <script type="x-shader/x-fragment" id="fragmentshader">
        uniform sampler2D colorTexture;
        uniform float opacity;
        float stepSize = 2.0;

        varying vec2 vUv;

        float intensity(in vec4 color) {
            float raw = sqrt((color.x*color.x)+(color.y*color.y)+(color.z*color.z)) / 1.732;
            return pow(raw, 0.4);
        }

        void main() {
            vec2 uv = vUv;

            ivec2 imageSize = textureSize(colorTexture, 0);
            vec2 step = vec2(stepSize/float(imageSize.x), stepSize/float(imageSize.y));

            float topLeft     = intensity(texture2D(colorTexture, uv + vec2(-step.x, step.y)));
            float left        = intensity(texture2D(colorTexture, uv + vec2(-step.x, 0)));
            float bottomLeft  = intensity(texture2D(colorTexture, uv + vec2(-step.x, -step.y)));
            float top         = intensity(texture2D(colorTexture, uv + vec2(0, step.y)));
            float bottom      = intensity(texture2D(colorTexture, uv + vec2(0, -step.y)));
            float topRight    = intensity(texture2D(colorTexture, uv + vec2(step.x, step.y)));
            float right       = intensity(texture2D(colorTexture, uv + vec2(step.x, 0)));
            float bottomRight = intensity(texture2D(colorTexture, uv + vec2(step.x, -step.y)));

            float horizontal = topLeft + 2.0 * left + bottomLeft - topRight - 2.0 * right - bottomRight;
            float vertical = -topLeft - 2.0 * top - topRight + bottomLeft + 2.0 * bottom + bottomRight;

            float sobelResult = clamp(sqrt(horizontal * horizontal + vertical * vertical) * 2.5, 0.0, 1.0);

            vec3 sobelRGB = vec3(1.0 - sobelResult);
            vec4 currentColor = texture2D(colorTexture, uv);

            float visibility = smoothstep(0.0, 0.4, opacity);
            float imageBlend = smoothstep(0.4, 0.9, opacity);

            vec3 rgb = mix(sobelRGB, currentColor.rgb, imageBlend);
            float alpha = mix(sobelResult, 1.0, imageBlend) * visibility;

            gl_FragColor = vec4(rgb, alpha);
        }
        </script>


        <script type="module">

        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { ARButton } from 'three/addons/webxr/ARButton.js';

        import ThreeMeshUI from 'three-mesh-ui';

        let container;
        let camera, scene, renderer;
        let controller1, controller2;
        let clock;

        let group = null;
        let imagePlane = null;
        let instructionsPlane = null;
        let currentOpacity = 0.75;
        let currentScale = 1.0;
        let previousDidPressHideImage = false;
        let previousDidPressHideInstructions = false;

        // ============================================================
        // DELTA-BASED GRAB STATE
        // Instead of computing absolute rotation each frame, we track
        // the CHANGE between frames and apply it to the object.
        // ============================================================

        // Two-hand grab state
        let isTwoHandGrabbing = false;
        let prevGrabMidpoint = null;
        let prevGrabQuat = null;
        let prevGrabDistance = 0;

        // Single-hand grab state (trigger on either controller)
        let singleGrabControllerIndex = -1;
        let prevSingleGrabPos = null;
        let prevSingleGrabQuat = null;

        // Hit-test state
        let hitTestSource = null;
        let hitTestReticle = null;
        let hitTestPose = null;

        init();
        animate();

        function init() {
            container = document.getElementById("container");

            scene = new THREE.Scene();

            camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 10);
            camera.position.set(0, 0, 1);

            const controls = new OrbitControls(camera, container);
            controls.minDistance = 0;
            controls.maxDistance = 8;

            clock = new THREE.Clock();

            // Renderer
            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setPixelRatio(window.devicePixelRatio);
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.outputEncoding = THREE.sRGBEncoding;
            renderer.localClippingEnabled = true;
            renderer.xr.enabled = true;
            renderer.xr.setFoveation(0);
            container.appendChild(renderer.domElement);

            // Controllers
            controller1 = renderer.xr.getController(0);
            scene.add(controller1);

            controller2 = renderer.xr.getController(1);
            scene.add(controller2);

            // Hit-test reticle (green ring on detected surfaces)
            const reticleGeometry = new THREE.RingGeometry(0.04, 0.05, 32).rotateX(-Math.PI / 2);
            const reticleMaterial = new THREE.MeshBasicMaterial({
                color: 0x00ff88,
                transparent: true,
                opacity: 0.6,
                side: THREE.DoubleSide
            });
            hitTestReticle = new THREE.Mesh(reticleGeometry, reticleMaterial);
            hitTestReticle.visible = false;
            hitTestReticle.matrixAutoUpdate = false;
            scene.add(hitTestReticle);

            // UI
            makeInstructionsUI();

            // Load image
            const length = 0.25;
            group = new THREE.Group();
            group.position.set(0, 0, -0.5);
            scene.add(group);

            const url = new URL(window.location);
            const imageUrlString = url.searchParams.get('image');

            if (imageUrlString == null) {
                loadTexture(group, length, 'Images/discovery.jpg');
            } else {
                try {
                    const imageUrl = new URL(imageUrlString);
                    document.getElementById("urlInput").value = imageUrlString;
                    loadTexture(group, length, imageUrl.toString());
                } catch (exception) {
                    alert("Invalid URL, try a different URL.");
                }
            }

            // Resize event
            window.addEventListener('resize', onWindowResize);

            // URL Input
            const inputLink = document.getElementById("urlInputLink");
            inputLink.onclick = changeImageUrl;

            // Send to Quest
            const sendToQuestLink = document.getElementById("urlToQuestLink");
            sendToQuestLink.onclick = sendUrlToQuest;
        }

        function makeInstructionsUI() {
            const textContainer = new ThreeMeshUI.Block({
                borderRadius: 0.05,
                width: 0.45,
                height: 0.68,
                padding: 0.05,
                textAlign: 'left',
                fontKerning: 'none',
                whiteSpace: 'pre-wrap',
                fontFamily: 'https://unpkg.com/three-mesh-ui@6.5.2/examples/assets/Roboto-msdf.json',
                fontTexture: 'https://unpkg.com/three-mesh-ui@6.5.2/examples/assets/Roboto-msdf.png'
            });

            textContainer.rotation.y = -45.0 * (Math.PI/180.0);
            textContainer.position.set(0.5, 0, -0.5);

            textContainer.add(
                new ThreeMeshUI.Text({
                    content: "Instructions\n",
                    fontSize: 0.04,
                    fontColor: new THREE.Color(0xffff00)
                }),
                new ThreeMeshUI.Text({
                    content: "\nAnalog right: ",
                    fontSize: 0.025,
                    fontColor: new THREE.Color(0xffff00)
                }),
                new ThreeMeshUI.Text({
                    content: "Increase opacity",
                    fontSize: 0.025,
                    fontColor: new THREE.Color(0xffffff)
                }),
                new ThreeMeshUI.Text({
                    content: "\nAnalog left: ",
                    fontSize: 0.025,
                    fontColor: new THREE.Color(0xffff00)
                }),
                new ThreeMeshUI.Text({
                    content: "Decrease opacity",
                    fontSize: 0.025,
                    fontColor: new THREE.Color(0xffffff)
                }),
                new ThreeMeshUI.Text({
                    content: "\n\nAnalog up: ",
                    fontSize: 0.025,
                    fontColor: new THREE.Color(0xffff00)
                }),
                new ThreeMeshUI.Text({
                    content: "Increase size",
                    fontSize: 0.025,
                    fontColor: new THREE.Color(0xffffff)
                }),
                new ThreeMeshUI.Text({
                    content: "\nAnalog down: ",
                    fontSize: 0.025,
                    fontColor: new THREE.Color(0xffff00)
                }),
                new ThreeMeshUI.Text({
                    content: "Decrease size",
                    fontSize: 0.025,
                    fontColor: new THREE.Color(0xffffff)
                }),
                new ThreeMeshUI.Text({
                    content: "\n\nTrigger: ",
                    fontSize: 0.025,
                    fontColor: new THREE.Color(0xffff00)
                }),
                new ThreeMeshUI.Text({
                    content: "Grab with one hand",
                    fontSize: 0.025,
                    fontColor: new THREE.Color(0xffffff)
                }),
                new ThreeMeshUI.Text({
                    content: "\nBoth grips: ",
                    fontSize: 0.025,
                    fontColor: new THREE.Color(0xffff00)
                }),
                new ThreeMeshUI.Text({
                    content: "Grab + rotate + scale",
                    fontSize: 0.025,
                    fontColor: new THREE.Color(0xffffff)
                }),
                new ThreeMeshUI.Text({
                    content: "\n\nA or X: ",
                    fontSize: 0.025,
                    fontColor: new THREE.Color(0xffff00)
                }),
                new ThreeMeshUI.Text({
                    content: "Snap to surface / Show-Hide",
                    fontSize: 0.025,
                    fontColor: new THREE.Color(0xffffff)
                }),
                new ThreeMeshUI.Text({
                    content: "\nB or Y: ",
                    fontSize: 0.025,
                    fontColor: new THREE.Color(0xffff00)
                }),
                new ThreeMeshUI.Text({
                    content: "Show/Hide instructions",
                    fontSize: 0.025,
                    fontColor: new THREE.Color(0xffffff)
                })
            );

            scene.add(textContainer);
            instructionsPlane = textContainer;
        }

        function changeImageUrl() {
            const urlInput = document.getElementById("urlInput");
            const url = new URL(window.location);
            url.searchParams.set("image", urlInput.value);
            window.location = url.toString();
        }

        function sendUrlToQuest() {
            const urlInput = document.getElementById("urlInput");
            const url = new URL(window.location);
            url.searchParams.set("image", urlInput.value);

            let sendToQuestUrl = new URL("https://oculus.com/open_url/");
            sendToQuestUrl.searchParams.set("url", url);
            window.location.href = sendToQuestUrl;
        }

        function loadTexture(container, length, url) {
            const loader = new THREE.TextureLoader();

            loader.load(
                url,
                function (texture) {
                    // Request hit-test as optional feature
                    const sessionInit = {
                        requiredFeatures: ['local-floor'],
                        optionalFeatures: ['hit-test']
                    };

                    const arButton = ARButton.createButton(renderer, sessionInit);
                    document.body.appendChild(arButton);

                    // Setup hit-test when XR session starts
                    renderer.xr.addEventListener('sessionstart', async () => {
                        const session = renderer.xr.getSession();
                        try {
                            const viewerSpace = await session.requestReferenceSpace('viewer');
                            hitTestSource = await session.requestHitTestSource({ space: viewerSpace });
                        } catch (e) {
                            console.log('Hit-test not available:', e);
                            hitTestSource = null;
                        }
                    });

                    renderer.xr.addEventListener('sessionend', () => {
                        hitTestSource = null;
                    });

                    let originalWidth = texture.image.width;
                    let originalHeight = texture.image.height;

                    let max = Math.max(originalWidth, originalHeight);
                    let width = (originalWidth/max) * length;
                    let height = (originalHeight/max) * length;

                    const geometry = new THREE.PlaneGeometry(width, height);
                    texture.generateMipmaps = false;

                    const sobelMaterial = new THREE.ShaderMaterial({
                        transparent: true,
                        side: THREE.DoubleSide,
                        uniforms: {
                            colorTexture: { value: texture },
                            opacity: { value: currentOpacity }
                        },
                        vertexShader: document.getElementById('vertexshader').textContent,
                        fragmentShader: document.getElementById('fragmentshader').textContent
                    });

                    imagePlane = new THREE.Mesh(geometry, sobelMaterial);
                    container.add(imagePlane);
                },
                undefined,
                function (err) {
                    alert("Unable to load image, try a different URL.\n\nCross-Origin Resource Sharing (CORS) policies might prevent the app from loading images from certain websites.");
                }
            );
        }

        function incrementOpacity(delta) {
            currentOpacity += delta;
            currentOpacity = Math.min(Math.max(currentOpacity, 0.0), 1.0);
            if (imagePlane != null) {
                imagePlane.material.uniforms["opacity"].value = currentOpacity;
            }
        }

        function incrementScale(delta) {
            currentScale += delta;
            currentScale = Math.min(Math.max(currentScale, 0.01), 4.0);
            if (group != null) {
                group.scale.setScalar(currentScale);
            }
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize( window.innerWidth, window.innerHeight );
        }

        function animate() {
            renderer.setAnimationLoop(loop);
        }

        function loop(timestamp, frame) {
            updateHitTest(frame);
            updateInput(frame);
            ThreeMeshUI.update();
            renderer.render(scene, camera);
        }

        // ============================================================
        // HIT-TEST: detect real surfaces and show reticle
        // ============================================================

        function updateHitTest(frame) {
            if (!frame || !hitTestSource) {
                hitTestReticle.visible = false;
                return;
            }

            const refSpace = renderer.xr.getReferenceSpace();
            const results = frame.getHitTestResults(hitTestSource);

            if (results.length > 0) {
                const hit = results[0];
                const pose = hit.getPose(refSpace);
                if (pose) {
                    hitTestReticle.visible = true;
                    hitTestReticle.matrix.fromArray(pose.transform.matrix);
                    hitTestPose = pose;
                } else {
                    hitTestReticle.visible = false;
                    hitTestPose = null;
                }
            } else {
                hitTestReticle.visible = false;
                hitTestPose = null;
            }
        }

        // ============================================================
        // SNAP TO SURFACE: place image flat on detected surface
        // ============================================================

        function snapToSurface() {
            if (!hitTestPose || !group) return false;

            const matrix = new THREE.Matrix4().fromArray(hitTestPose.transform.matrix);
            const pos = new THREE.Vector3();
            const quat = new THREE.Quaternion();
            const scl = new THREE.Vector3();
            matrix.decompose(pos, quat, scl);

            // Offset slightly above the surface to prevent z-fighting
            pos.y += 0.002;
            group.position.copy(pos);
            group.quaternion.copy(quat);

            // Lay the plane flat on the surface.
            // Hit-test Y = surface normal, so rotate -90deg around X
            const layFlat = new THREE.Quaternion().setFromAxisAngle(
                new THREE.Vector3(1, 0, 0), -Math.PI / 2
            );
            group.quaternion.multiply(layFlat);

            return true;
        }

        // ============================================================
        // HELPER: Get controller world position and quaternion
        // In WebXR, controller.position can be stale. Always use these.
        // ============================================================

        function getControllerWorldPos(index) {
            const c = renderer.xr.getController(index);
            return c.localToWorld(new THREE.Vector3(0, 0, 0));
        }

        function getControllerWorldQuat(index) {
            const c = renderer.xr.getController(index);
            const q = new THREE.Quaternion();
            c.getWorldQuaternion(q);
            return q;
        }

        // ============================================================
        // DELTA-BASED TWO-HAND GRAB
        //
        // Key insight: instead of computing "where should the image be"
        // from scratch each frame, we compute "how did the hands change
        // since last frame" and apply that delta to the current pose.
        //
        // This captures ALL rotations faithfully (pitch, yaw, roll)
        // because we use the average quaternion of both controllers
        // directly via SLERP, rather than trying to construct rotation
        // from axis vectors (which was the root cause of the old bug).
        // ============================================================

        function computeTwoHandPose(c1Pos, c2Pos, c1Quat, c2Quat) {
            const midpoint = c1Pos.clone().add(c2Pos).multiplyScalar(0.5);

            // SLERP at 0.5 = average orientation of both hands.
            // Directly captures actual tilt/pitch/roll.
            const avgQuat = c1Quat.clone().slerp(c2Quat, 0.5);

            const distance = c1Pos.distanceTo(c2Pos);

            return { midpoint, quat: avgQuat, distance };
        }

        function updateTwoHandGrab(c1Pos, c2Pos, c1Quat, c2Quat) {
            const current = computeTwoHandPose(c1Pos, c2Pos, c1Quat, c2Quat);

            if (!isTwoHandGrabbing) {
                // === GRAB START ===
                isTwoHandGrabbing = true;
                prevGrabMidpoint = current.midpoint.clone();
                prevGrabQuat = current.quat.clone();
                prevGrabDistance = current.distance;
                return;
            }

            // === GRAB UPDATE: compute delta and apply ===

            // 1. TRANSLATION DELTA
            const deltaPos = current.midpoint.clone().sub(prevGrabMidpoint);
            group.position.add(deltaPos);

            // 2. ROTATION DELTA
            // deltaQuat = current * inverse(previous)
            // = "how much did the hands rotate since last frame"
            const prevQuatInv = prevGrabQuat.clone().invert();
            const deltaQuat = current.quat.clone().multiply(prevQuatInv);

            // Apply rotation around the grab midpoint (natural pivot)
            const pivot = current.midpoint;
            const objToPivot = group.position.clone().sub(pivot);
            objToPivot.applyQuaternion(deltaQuat);
            group.position.copy(pivot).add(objToPivot);
            group.quaternion.premultiply(deltaQuat);

            // 3. SCALE DELTA (pinch-to-zoom)
            if (prevGrabDistance > 0.01 && current.distance > 0.01) {
                const scaleRatio = current.distance / prevGrabDistance;
                currentScale *= scaleRatio;
                currentScale = Math.min(Math.max(currentScale, 0.01), 4.0);
                group.scale.setScalar(currentScale);
            }

            // Store for next frame
            prevGrabMidpoint = current.midpoint.clone();
            prevGrabQuat = current.quat.clone();
            prevGrabDistance = current.distance;
        }

        function endTwoHandGrab() {
            isTwoHandGrabbing = false;
            prevGrabMidpoint = null;
            prevGrabQuat = null;
            prevGrabDistance = 0;
        }

        // ============================================================
        // SINGLE-HAND GRAB (trigger button)
        //
        // Press trigger with one hand to grab and move/rotate the image.
        // Uses the same delta technique — tracks the controller's
        // quaternion change frame-to-frame and applies it directly.
        // ============================================================

        function updateSingleHandGrab(controllerIndex) {
            const pos = getControllerWorldPos(controllerIndex);
            const quat = getControllerWorldQuat(controllerIndex);

            if (singleGrabControllerIndex !== controllerIndex) {
                // === GRAB START ===
                singleGrabControllerIndex = controllerIndex;
                prevSingleGrabPos = pos.clone();
                prevSingleGrabQuat = quat.clone();
                return;
            }

            // === GRAB UPDATE ===
            const deltaPos = pos.clone().sub(prevSingleGrabPos);
            group.position.add(deltaPos);

            const prevQuatInv = prevSingleGrabQuat.clone().invert();
            const deltaQuat = quat.clone().multiply(prevQuatInv);

            const pivot = pos;
            const objToPivot = group.position.clone().sub(pivot);
            objToPivot.applyQuaternion(deltaQuat);
            group.position.copy(pivot).add(objToPivot);
            group.quaternion.premultiply(deltaQuat);

            prevSingleGrabPos = pos.clone();
            prevSingleGrabQuat = quat.clone();
        }

        function endSingleHandGrab() {
            singleGrabControllerIndex = -1;
            prevSingleGrabPos = null;
            prevSingleGrabQuat = null;
        }

        // ============================================================
        // INPUT PROCESSING
        // ============================================================

        function updateInput(frame) {
            const xrSession = renderer.xr.getSession();
            const elapsedTime = clock.getDelta();

            let didPressHideImage = false;
            let didPressHideInstructions = false;

            if (xrSession == null || xrSession.inputSources.length <= 0) {
                return;
            }

            let bothGripsPressed = true;
            let controllerPositions = [];
            let controllerQuaternions = [];
            let validControllerCount = 0;
            let triggerControllerIndex = -1;

            for (let i = 0; i < xrSession.inputSources.length; i++) {
                const input = xrSession.inputSources[i];
                const gamepad = input.gamepad;

                if (
                    gamepad != null &&
                    gamepad.mapping == "xr-standard" &&
                    gamepad.axes.length >= 4
                ) {
                    validControllerCount++;

                    const horizontal = gamepad.axes[2];
                    const vertical = gamepad.axes[3];

                    const triggerButton = gamepad.buttons[0];
                    const gripButton = gamepad.buttons[1];
                    const axButton = gamepad.buttons[4];
                    const byButton = gamepad.buttons[5];

                    if (!gripButton.pressed) {
                        bothGripsPressed = false;
                    }

                    // Track trigger for single-hand grab
                    if (triggerButton.pressed) {
                        triggerControllerIndex = i;
                    }

                    // Thumbstick controls (only when not grabbing)
                    if (!isTwoHandGrabbing && singleGrabControllerIndex < 0) {
                        if (vertical > 0.7) {
                            incrementScale(-1.0 * elapsedTime);
                        } else if (vertical < -0.7) {
                            incrementScale(1.0 * elapsedTime);
                        }

                        if (horizontal > 0.7) {
                            incrementOpacity(1.0 * elapsedTime);
                        } else if (horizontal < -0.7) {
                            incrementOpacity(-1.0 * elapsedTime);
                        }
                    }

                    controllerPositions.push(getControllerWorldPos(i));
                    controllerQuaternions.push(getControllerWorldQuat(i));

                    if (axButton.pressed) {
                        didPressHideImage = true;
                    }

                    if (byButton.pressed) {
                        didPressHideInstructions = true;
                    }
                }
            }

            bothGripsPressed = bothGripsPressed && validControllerCount >= 2 && controllerPositions.length >= 2;

            // === PRIORITY: Two-hand grab > Single-hand grab ===

            if (bothGripsPressed) {
                if (singleGrabControllerIndex >= 0) {
                    endSingleHandGrab();
                }

                updateTwoHandGrab(
                    controllerPositions[0], controllerPositions[1],
                    controllerQuaternions[0], controllerQuaternions[1]
                );
            } else {
                if (isTwoHandGrabbing) {
                    endTwoHandGrab();
                }

                if (triggerControllerIndex >= 0) {
                    updateSingleHandGrab(triggerControllerIndex);
                } else if (singleGrabControllerIndex >= 0) {
                    endSingleHandGrab();
                }
            }

            // === A/X: snap to surface if available, else toggle visibility ===

            const shouldHandleAX = (!didPressHideImage && previousDidPressHideImage);
            previousDidPressHideImage = didPressHideImage;

            if (shouldHandleAX) {
                if (!snapToSurface()) {
                    imagePlane.visible = !imagePlane.visible;
                }
            }

            // === B/Y: toggle instructions ===

            const shouldChangeInstructionsVisibility = (!didPressHideInstructions && previousDidPressHideInstructions);
            previousDidPressHideInstructions = didPressHideInstructions;

            if (shouldChangeInstructionsVisibility) {
                instructionsPlane.visible = !instructionsPlane.visible;
            }
        }

        </script>
